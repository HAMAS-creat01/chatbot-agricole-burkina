<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Assistant Agricole</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #1b5e20, #2e7d32); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 16px; padding: 40px; width: 100%; max-width: 420px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo span { font-size: 48px; }
        .logo h1 { font-size: 22px; font-weight: 700; color: #1b5e20; margin-top: 10px; }
        .logo p { font-size: 13px; color: #64748b; margin-top: 4px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .form-group input { width: 100%; padding: 12px 16px; border: 1.5px solid #d1d5db; border-radius: 8px; font-size: 14px; outline: none; font-family: 'Inter', sans-serif; }
        .form-group input:focus { border-color: #2e7d32; }
        .btn { width: 100%; padding: 13px; background: #2e7d32; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
        .btn:hover { background: #1b5e20; }
        .erreur { background: #fee2e2; color: #dc2626; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
        .lien { text-align: center; margin-top: 20px; font-size: 13px; color: #64748b; }
        .lien a { color: #2e7d32; font-weight: 600; text-decoration: none; }
        .invité { text-align: center; margin-top: 12px; }
        .invité a { color: #64748b; font-size: 13px; text-decoration: none; }
        .invité a:hover { color: #2e7d32; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <span>🌾</span>
        <h1>Assistant Agricole</h1>
        <p>Burkina Faso — Connexion</p>
    </div>
    <div class="erreur" id="erreur"></div>
    <div class="form-group">
        <label>📧 Email</label>
        <input type="email" id="email" placeholder="votre@email.com"/>
    </div>
    <div class="form-group">
        <label>🔒 Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" onkeypress="if(event.key==='Enter') connexion()"/>
    </div>
    <button class="btn" onclick="connexion()">Se connecter →</button>
    <div class="lien">Pas encore de compte ? <a href="/register">S'inscrire gratuitement</a></div>
    <div class="invité"><a href="/">Continuer sans compte →</a></div>
</div>
<script>
function connexion() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const erreur = document.getElementById('erreur');
    if (!email || !password) { erreur.textContent = 'Veuillez remplir tous les champs.'; erreur.style.display = 'block'; return; }
    fetch('/api/login', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email, mot_de_passe: password }) })
    .then(res => res.json())
    .then(data => {
        if (data.success) { window.location.href = '/'; }
        else { erreur.textContent = data.erreur; erreur.style.display = 'block'; }
    });
}
</script>
</body>
</html>
